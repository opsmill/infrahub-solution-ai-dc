---
x-infrahub-custom-build: &infrahub_custom_build
  image: opsmill/infrahub-solution-ai-dc:${INFRAHUB_BASE_VERSION:-1.6.0}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      INFRAHUB_BASE_VERSION: "${INFRAHUB_BASE_VERSION:-1.6.0}"

services:
  infrahub-server:
    <<: *infrahub_custom_build
  database:
    ports:
      - 7474:7474
      - 7687:7687

  task-manager:
    <<: *infrahub_custom_build
    ports:
      - 4200:4200

  task-worker:
    <<: *infrahub_custom_build
    environment:
      INFRAHUB_TIMEOUT: 180
    volumes:
      - ./:/upstream
      - ./src:/opt/local/src
