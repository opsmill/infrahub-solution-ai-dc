<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 520" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Fabric-A container -->
  <rect x="10" y="10" width="1040" height="500" rx="12" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="30" y="38" font-size="16" font-weight="700" fill="#333">Fabric-A</text>

  <!-- Super Spines -->
  <rect x="350" y="55" width="360" height="55" rx="8" fill="#4a90d9" filter="url(#shadow)"/>
  <text x="530" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#333">6 Super Spines</text>
  <text x="530" y="97" text-anchor="middle" font-size="12" fill="#333">ss-fabric-a-1 … ss-fabric-a-6</text>

  <!-- Full mesh lines -->
  <line x1="430" y1="110" x2="270" y2="175" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="330" y="142" font-size="11" fill="#333" transform="rotate(-20 330 142)">full mesh</text>
  <line x1="630" y1="110" x2="790" y2="175" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="715" y="142" font-size="11" fill="#333" transform="rotate(20 715 142)">full mesh</text>

  <!-- Pod-A2 container: x=20, width=505 (half of 1040-20-10 minus 5px gap each side) -->
  <rect x="20" y="165" width="505" height="230" rx="10" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="40" y="190" font-size="14" font-weight="700" fill="#333">Pod-A2</text>
  <text x="98" y="190" font-size="13" fill="#666">· role: cpu</text>

  <!-- Pod-A2 Spines - centered at x=272 -->
  <rect x="142" y="205" width="260" height="50" rx="8" fill="#f5a623" filter="url(#shadow)"/>
  <text x="272" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#333">4 Spines</text>
  <text x="272" y="244" text-anchor="middle" font-size="11" fill="#333">spine-pod-a2-1 … 4</text>

  <!-- Pod-A2 Racks - 4 in a row, 110px each, 10px gaps, centered in 505px pod
       total rack width = 4*110 + 3*10 = 470, left margin = (505-470)/2 = 17.5, start at 20+17.5=37 -->
  <rect x="37" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="92" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-1</text>
  <text x="92" y="326" text-anchor="middle" font-size="10" fill="#333">compute · 2 leafs</text>

  <rect x="157" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="212" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-2</text>
  <text x="212" y="326" text-anchor="middle" font-size="10" fill="#333">compute · 1 leaf</text>

  <rect x="277" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="332" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-3</text>
  <text x="332" y="326" text-anchor="middle" font-size="10" fill="#333">compute · 2 leafs</text>

  <rect x="397" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="452" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-4</text>
  <text x="452" y="326" text-anchor="middle" font-size="10" fill="#333">storage · 1 leaf</text>

  <!-- Pod-A2 spine-to-rack lines -->
  <line x1="202" y1="255" x2="92" y2="290" stroke="#333" stroke-width="1.2"/>
  <line x1="242" y1="255" x2="212" y2="290" stroke="#333" stroke-width="1.2"/>
  <line x1="302" y1="255" x2="332" y2="290" stroke="#333" stroke-width="1.2"/>
  <line x1="342" y1="255" x2="452" y2="290" stroke="#333" stroke-width="1.2"/>

  <!-- Pod-A3 container: x=535, width=505 -->
  <rect x="535" y="165" width="505" height="230" rx="10" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="555" y="190" font-size="14" font-weight="700" fill="#333">Pod-A3</text>
  <text x="613" y="190" font-size="13" fill="#666">· role: cpu</text>

  <!-- Pod-A3 Spines - centered at x=787 -->
  <rect x="657" y="205" width="260" height="50" rx="8" fill="#f5a623" filter="url(#shadow)"/>
  <text x="787" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#333">4 Spines</text>
  <text x="787" y="244" text-anchor="middle" font-size="11" fill="#333">spine-pod-a3-1 … 4</text>

  <!-- Pod-A3 Racks - 4 in a row, centered in 505px pod
       start at 535+17.5=552 -->
  <rect x="552" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="607" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A3-1</text>
  <text x="607" y="326" text-anchor="middle" font-size="10" fill="#333">compute · 2 leafs</text>

  <rect x="672" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="727" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A3-2</text>
  <text x="727" y="326" text-anchor="middle" font-size="10" fill="#333">compute · 1 leaf</text>

  <rect x="792" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="847" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A3-3</text>
  <text x="847" y="326" text-anchor="middle" font-size="10" fill="#333">storage · 1 leaf</text>

  <rect x="912" y="290" width="110" height="50" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="967" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A3-4</text>
  <text x="967" y="326" text-anchor="middle" font-size="10" fill="#333">compute · 1 leaf</text>

  <!-- Pod-A3 spine-to-rack lines -->
  <line x1="717" y1="255" x2="607" y2="290" stroke="#333" stroke-width="1.2"/>
  <line x1="757" y1="255" x2="727" y2="290" stroke="#333" stroke-width="1.2"/>
  <line x1="817" y1="255" x2="847" y2="290" stroke="#333" stroke-width="1.2"/>
  <line x1="857" y1="255" x2="967" y2="290" stroke="#333" stroke-width="1.2"/>

  <!-- Legend -->
  <rect x="50" y="420" width="16" height="16" rx="3" fill="#4a90d9"/>
  <text x="74" y="433" font-size="12" fill="#333">Super Spine</text>
  <rect x="170" y="420" width="16" height="16" rx="3" fill="#f5a623"/>
  <text x="194" y="433" font-size="12" fill="#333">Spine</text>
  <rect x="260" y="420" width="16" height="16" rx="3" fill="#7ed321"/>
  <text x="284" y="433" font-size="12" fill="#333">Leaf (per rack)</text>

  <text x="50" y="460" font-size="12" fill="#333">Each spine connects to all super spines · Each leaf connects to all spines in its pod</text>
  <text x="50" y="478" font-size="12" fill="#333">Total: 6 super spines + 8 spines + 11 leafs = 25 devices</text>
</svg>
