<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 500" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="1040" height="480" rx="12" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="530" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Deterministic interface allocation — rack-to-spine example</text>

  <!-- ===== LEFT SIDE: Normal state (all 3 racks) ===== -->
  <rect x="25" y="55" width="500" height="295" rx="10" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="275" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#333">All 3 racks present</text>

  <!-- Spine device - wider -->
  <rect x="55" y="95" width="440" height="40" rx="6" fill="#f5a623" filter="url(#shadow)"/>
  <text x="275" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#333">spine-pod-a2-1 — leaf-facing interfaces (sorted)</text>

  <!-- Interface slots -->
  <rect x="100" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="120" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth1</text>

  <rect x="145" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="165" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth2</text>

  <rect x="200" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="220" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth3</text>

  <rect x="245" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="265" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth4</text>

  <rect x="300" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="320" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth5</text>

  <rect x="345" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="365" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth6</text>

  <rect x="400" y="140" width="40" height="32" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="420" y="161" text-anchor="middle" font-size="9" fill="#999">…</text>

  <!-- Slot range brackets -->
  <line x1="100" y1="178" x2="100" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="185" y1="178" x2="185" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="100" y1="195" x2="185" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="142" y1="195" x2="142" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="200" y1="178" x2="200" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="285" y1="178" x2="285" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="200" y1="195" x2="285" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="242" y1="195" x2="242" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="300" y1="178" x2="300" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="385" y1="178" x2="385" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="300" y1="195" x2="385" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="342" y1="195" x2="342" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Index labels -->
  <text x="142" y="225" text-anchor="middle" font-size="10" fill="#333">index 1 → slots 0–1</text>
  <text x="242" y="225" text-anchor="middle" font-size="10" fill="#333">index 2 → slots 2–3</text>
  <text x="342" y="225" text-anchor="middle" font-size="10" fill="#333">index 3 → slots 4–5</text>

  <!-- Rack boxes -->
  <rect x="85" y="240" width="115" height="45" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="142" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-1</text>
  <text x="142" y="275" text-anchor="middle" font-size="10" fill="#333">2 leafs → Eth1, Eth2</text>

  <rect x="210" y="240" width="115" height="45" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="267" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-2</text>
  <text x="267" y="275" text-anchor="middle" font-size="10" fill="#333">1 leaf → Eth3</text>

  <rect x="335" y="240" width="115" height="45" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="392" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-3</text>
  <text x="392" y="275" text-anchor="middle" font-size="10" fill="#333">2 leafs → Eth5, Eth6</text>

  <!-- ===== RIGHT SIDE: After Rack-2 decommissioned ===== -->
  <rect x="540" y="55" width="500" height="295" rx="10" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="790" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#333">After Rack-A2-2 is decommissioned</text>

  <!-- Spine device - wider -->
  <rect x="570" y="95" width="440" height="40" rx="6" fill="#f5a623" filter="url(#shadow)"/>
  <text x="790" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#333">spine-pod-a2-1 — leaf-facing interfaces (sorted)</text>

  <!-- Interface slots -->
  <rect x="615" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="635" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth1</text>

  <rect x="660" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="680" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth2</text>

  <rect x="715" y="140" width="40" height="32" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="735" y="161" text-anchor="middle" font-size="9" fill="#bbb">Eth3</text>

  <rect x="760" y="140" width="40" height="32" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="780" y="161" text-anchor="middle" font-size="9" fill="#bbb">Eth4</text>

  <rect x="815" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="835" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth5</text>

  <rect x="860" y="140" width="40" height="32" rx="4" fill="#7ed321" stroke="#5ea31a" stroke-width="1"/>
  <text x="880" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Eth6</text>

  <rect x="915" y="140" width="40" height="32" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="935" y="161" text-anchor="middle" font-size="9" fill="#999">…</text>

  <!-- Slot range brackets -->
  <line x1="615" y1="178" x2="615" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="700" y1="178" x2="700" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="615" y1="195" x2="700" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="657" y1="195" x2="657" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="715" y1="178" x2="715" y2="195" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="800" y1="178" x2="800" y2="195" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="715" y1="195" x2="800" y2="195" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="757" y1="195" x2="757" y2="210" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="815" y1="178" x2="815" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="900" y1="178" x2="900" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="815" y1="195" x2="900" y2="195" stroke="#333" stroke-width="1"/>
  <line x1="857" y1="195" x2="857" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Index labels -->
  <text x="657" y="225" text-anchor="middle" font-size="10" fill="#333">index 1 → slots 0–1</text>
  <text x="757" y="225" text-anchor="middle" font-size="10" fill="#bbb">index 2 → (empty)</text>
  <text x="857" y="225" text-anchor="middle" font-size="10" fill="#333">index 3 → slots 4–5</text>

  <!-- Rack boxes -->
  <rect x="600" y="240" width="115" height="45" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="657" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-1</text>
  <text x="657" y="275" text-anchor="middle" font-size="10" fill="#333">2 leafs → Eth1, Eth2</text>

  <rect x="725" y="240" width="115" height="45" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="782" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#bbb">Rack-A2-2</text>
  <text x="782" y="275" text-anchor="middle" font-size="10" fill="#bbb">decommissioned</text>

  <rect x="850" y="240" width="115" height="45" rx="6" fill="#7ed321" filter="url(#shadow)"/>
  <text x="907" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Rack-A2-3</text>
  <text x="907" y="275" text-anchor="middle" font-size="10" fill="#333">2 leafs → Eth5, Eth6</text>

  <!-- ===== BOTTOM: Three-step process ===== -->
  <rect x="25" y="370" width="300" height="55" rx="8" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="175" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#333">1. Collect</text>
  <text x="175" y="410" text-anchor="middle" font-size="11" fill="#333">Fetch interfaces by role (e.g. leaf-facing)</text>

  <line x1="325" y1="397" x2="365" y2="397" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="373" y="370" width="300" height="55" rx="8" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="523" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#333">2. Sort</text>
  <text x="523" y="410" text-anchor="middle" font-size="11" fill="#333">Sort by name (netutils) → stable ordering</text>

  <line x1="673" y1="397" x2="713" y2="397" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="721" y="370" width="300" height="55" rx="8" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="871" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#333">3. Index</text>
  <text x="871" y="410" text-anchor="middle" font-size="11" fill="#333">Rack index → interface slot range</text>

  <!-- Bottom note -->
  <text x="530" y="455" text-anchor="middle" font-size="12" fill="#333">The same rack index always maps to the same interface slots — regardless of which other racks exist.</text>
  <text x="530" y="473" text-anchor="middle" font-size="12" fill="#333">Sorting direction is configurable per fabric level (ascending or descending).</text>
</svg>
