query ($pod_name: String!) {
  NetworkPodBuilder(name__value: $pod_name) {
    edges {
      node {
        id
        name {
          value
        }
        checksum {
          value
        }
        target {
          node {
            ... on NetworkPod {
              name {
                value
              }
              id
              index {
                value
              }
              parent {
                node {
                  id
                  name {
                    value
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
