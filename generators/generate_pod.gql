query ($pod_name: String!) {
  NetworkPod(name__value: $pod_name) {
    edges {
      node {
        id
        amount_of_spines {
          value
        }
        name {
          value
        }
        checksum {
          value
        }
        index {
          value
        }
        role {
          value
        }
	spine_switch_template {
	  node {
	    id
	  }
	}
        parent {
          node {
            id
            name {
              value
            }
            ... on NetworkFabric {
              amount_of_super_spines {
                value
              }
	      fabric_interface_sorting_method {
		value
	      }
	      spine_interface_sorting_method {
		value
	      }
            }
          }
        }
      }
    }
  }
}
