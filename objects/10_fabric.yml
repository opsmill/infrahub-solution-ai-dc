---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: NetworkFabric
  data:
    - name: "Fabric-A"
      index: 1
      amount_of_super_spines: 6
      super_spine_switch_template: "super-spine-switch"
      fabric_interface_sorting_method: "create_reverse_sorted_device_interface_map"
      spine_interface_sorting_method: "create_sorted_device_interface_map"
      member_of_groups: ["fabrics"]
      children:
        kind: NetworkPod
        data:
          - name: "Pod-A1"
            index: 1
            role: "fabric"
            member_of_groups: ["pods"]
            leaf_interface_sorting_method: "create_sorted_device_interface_map"
            spine_interface_sorting_method: "create_sorted_device_interface_map"
          - name: "Pod-A2"
            index: 2
            spine_switch_template: "spine-switch"
            member_of_groups: ["pods"]
            leaf_interface_sorting_method: "create_sorted_device_interface_map"
            spine_interface_sorting_method: "create_sorted_device_interface_map"
          - name: "Pod-A3"
            index: 3
            spine_switch_template: "spine-switch"
            member_of_groups: ["pods"]
            leaf_interface_sorting_method: "create_sorted_device_interface_map"
            spine_interface_sorting_method: "create_sorted_device_interface_map"
    - name: "Fabric-B"
      index: 2
      member_of_groups: ["fabrics"]
      super_spine_switch_template: "super-spine-switch"
      amount_of_super_spines: 4
      children:
        kind: NetworkPod
        data:
          - name: "Pod-B1"
            index: 1
            role: "fabric"
            member_of_groups: ["pods"]
          - name: "Pod-B2"
            index: 2
            spine_switch_template: "spine-switch"
            member_of_groups: ["pods"]
          - name: "Pod-B3"
            index: 3
            spine_switch_template: "spine-switch"
            member_of_groups: ["pods"]
