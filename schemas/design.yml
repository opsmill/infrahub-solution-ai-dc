# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
nodes:
  - name: Hall
    namespace: Network
    attributes:
      - name: name
        kind: Text
        unique: true
    relationships:
      - name: pods
        peer: NetworkPod
        cardinality: many
        identifier: "pod__hall"

  - name: Pod
    namespace: Network
    attributes:
      - name: name
        kind: Text
        unique: true
      - name: pod_id
        kind: Number
    relationships:
      - name: hall
        peer: NetworkHall
        kind: Attribute
        cardinality: one
        identifier: "pod__hall"
      - name: racks
        peer: NetworkRack
        cardinality: many
        kind: Generic
        identifier: "pod__rack"

  - name: Rack
    namespace: Network
    attributes:
      - name: name
        kind: Text
      - name: rack_id
        kind: Number
    relationships:
      - name: pod
        peer: NetworkPod
        cardinality: one
        kind: Attribute
        identifier: "pod__rack"