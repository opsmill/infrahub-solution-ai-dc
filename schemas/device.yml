# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: Endpoint
    namespace: Network
    include_in_menu: false
    relationships:
      - name: link
        peer: NetworkLink
        cardinality: one
        kind: Attribute
        optional: true
        order_weight: 6000
nodes:
  - name: Manufacturer
    namespace: Organization
    label: Manufacturer
    human_friendly_id:
      - name__value
    display_label: name__value
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        label: Name
        optional: false
        unique: true
    relationships:
      - name: device_types
        optional: true
        kind: "Generic"
        peer: NetworkDeviceType
        identifier: "manufacturer__device_type"
  - name: DeviceType
    namespace: Network
    label: Device Type
    uniqueness_constraints:
      - [manufacturer, name__value]
    human_friendly_id:
      - manufacturer__name__value
      - name__value
    include_in_menu: false
    attributes:
      - name: name
        label: Name
        kind: Text
        optional: false
    relationships:
      - name: manufacturer
        label: Manufacturer
        kind: Attribute
        cardinality: one
        peer: OrganizationManufacturer
        optional: false
        identifier: "manufacturer__device_type"
      - name: devices
        optional: true
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "device__device_type"
  - name: Device
    namespace: Network
    generate_template: true
    inherit_from:
      - CoreArtifactTarget
    display_label: hostname__value
    include_in_menu: false
    attributes:
      - name: index
        kind: Number
        optional: true
      - name: hostname
        kind: Text
        unique: true
      - name: role
        kind: Dropdown
        choices:
          - name: super_spine
            label: Super spine
          - name: spine
            label: Spine
          - name: leaf
            label: Leaf
    relationships:
      - name: device_type
        kind: Attribute
        optional: true
        cardinality: one
        peer: NetworkDeviceType
        identifier: "device__device_type"
      - name: loopback_ip
        peer: IpamIPAddress
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "device__ip_address"
      - name: rack
        peer: LocationRack
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "rack__device"
      - name: pod
        peer: NetworkPod
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "pod__device"
      - name: interfaces
        peer: NetworkInterface
        kind: Component
        cardinality: many
        optional: true
        identifier: "device__interface"

  - name: Interface
    namespace: Network
    inherit_from:
      - NetworkEndpoint
    uniqueness_constraints:
      - [device, name__value]
    human_friendly_id:
      - device__hostname__value
      - name__value
    order_by: ["index__value"]
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        order_weight: 1000
      - name: description
        kind: Text
        computed_attribute:
          kind: TransformPython
          transform: computed_interface_description
        read_only: true
        optional: true
        order_weight: 4000
      - name: status
        kind: Dropdown
        default_value: inactive
        choices:
          - name: active
          - name: inactive
          - name: maintenance
        order_weight: 2000
      - name: role
        kind: Dropdown
        optional: true
        choices:
          - name: uplink
            label: Uplink
          - name: access
            label: Access
          - name: spine
            label: Spine
          - name: super_spine
            label: Super Spine
          - name: leaf
            label: Leaf
          - name: loopback
            label: Loopback
          - name: server
            label: Server
          - name: storage
            label: Storage
        order_weight: 3000
      - name: mtu
        label: MTU
        kind: Number
        optional: true
        order_weight: 5000
      - name: index
        kind: Text
        read_only: true
        optional: true
        computed_attribute:
          jinja2_template: "{{ \"%03d\"| format(name__value | split_interface | last | int) }}"
          kind: Jinja2
        order_weight: 20000
    relationships:
      - name: device
        peer: NetworkDevice
        kind: Parent
        optional: false
        cardinality: one
        identifier: device__interface
        order_weight: 10000
      - name: ip_address
        label: IP Address
        peer: IpamIPAddress
        kind: Attribute
        cardinality: one
        optional: true
        identifier: interface__ip_address
        order_weight: 6000

  - name: Link
    namespace: Network
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        unique: true
        optional: false
      - name: medium
        label: Medium
        kind: Dropdown
        optional: false
        choices:
          - name: mmf
            label: Multi-Mode Fibre
          - name: smf
            label: Single-Mode Fibre
          - name: copper
            label: Copper
    relationships:
      - name: endpoints
        peer: NetworkEndpoint
        cardinality: many
        kind: Attribute
        optional: true
        max_count: 2
