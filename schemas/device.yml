# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: Endpoint
    namespace: Network
    include_in_menu: false
    relationships:
      - name: link
        peer: NetworkLink
        cardinality: one
        kind: Attribute
        optional: true
nodes:
  - name: Device
    namespace: Network
    generate_template: true
    inherit_from:
      - CoreArtifactTarget
    display_labels:
      - hostname__value
    include_in_menu: false
    attributes:
      - name: hostname
        kind: Text
        unique: true
      - name: role
        kind: Dropdown
        choices:
          - name: super_spine
            label: Super spine
          - name: spine
            label: Spine
          - name: leaf
            label: Leaf
    relationships:
      - name: loopback_ip
        peer: IpamIPAddress
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "device__ip_address"
      - name: rack
        peer: LocationRack
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "rack__device"
      - name: pod
        peer: NetworkPod
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "pod__device"
      - name: interfaces
        peer: NetworkInterface
        kind: Component
        cardinality: many
        optional: true
        identifier: "device__interface"

  - name: Interface
    namespace: Network
    inherit_from:
      - NetworkEndpoint
    uniqueness_constraints:
      - [device, name__value]
    order_by: ["index__value"]
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
      - name: description
        kind: Text
        computed_attribute:
          kind: TransformPython
          transform: computed_interface_description
        read_only: true
        optional: true
      - name: status
        kind: Dropdown
        default_value: inactive
        choices:
          - name: active
          - name: inactive
          - name: maintenance
      - name: role
        kind: Dropdown
        optional: true
        choices:
          - name: uplink
            label: Uplink
          - name: access
            label: Access
          - name: spine
            label: Spine
          - name: super_spine
            label: Super Spine
          - name: leaf
            label: Leaf
          - name: loopback
            label: Loopback
          - name: server
            label: Server
          - name: storage
            label: Storage
      - name: index
        kind: Text
        read_only: true
        optional: true
        computed_attribute:
          jinja2_template: "{{ \"%03d\"| format(name__value | split_interface | last | int) }}"
          kind: Jinja2
    relationships:
      - name: device
        peer: NetworkDevice
        kind: Parent
        optional: false
        cardinality: one
        identifier: device__interface
      - name: ip_address
        label: IP Address
        peer: IpamIPAddress
        kind: Attribute
        cardinality: one
        optional: true
        identifier: interface__ip_address

  - name: Link
    namespace: Network
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        unique: true
        optional: false
      - name: medium
        label: Medium
        kind: Dropdown
        optional: false
        choices:
          - name: mmf
            label: Multi-Mode Fibre
          - name: smf
            label: Single-Mode Fibre
          - name: copper
            label: Copper
    relationships:
      - name: endpoints
        peer: NetworkEndpoint
        cardinality: many
        kind: Attribute
        optional: true
        max_count: 2
