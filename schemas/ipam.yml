# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
nodes:
  - name: IPPrefix
    namespace: Ipam
    human_friendly_id:
      - prefix__value
    inherit_from:
      - BuiltinIPPrefix
    include_in_menu: false
    attributes:
      - name: role
        kind: Dropdown
        optional: false
        choices:
          - name: supernet
            label: Supernet
          - name: fabric_supernet
            label: Fabric Supernet
          - name: super_spine_loopback
            label: Super Spine Loopback
          - name: pod_supernet
            label: Pod Supernet
          - name: pod_loopback
            label: Pod Loopback
          - name: pod_super_spine_spine
            label: Pod Super Spine Spine
          - name: pod_leaf_spine
            label: Pod Leaf Spine
  - name: IPAddress
    namespace: Ipam
    inherit_from:
      - BuiltinIPAddress
    include_in_menu: false
