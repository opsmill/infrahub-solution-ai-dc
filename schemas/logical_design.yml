# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: BuildingBlock
    namespace: Network
    hierarchical: true
    display_labels: [ name__value ]
    attributes:
      - name: name
        kind: Text
        unique: true
      - name: index
        kind: Number
      - name: checksum
        kind: Text
        optional: true
  - name: Builder
    namespace: Network
    display_labels:
      - name__value
    attributes:
      - name: name
        kind: Text
        optional: false
        unique: true
      - name: parent_checksum
        kind: Text
        optional: true
    relationships:
      - name: building_block
        peer: NetworkBuildingBlock
        cardinality: one
        kind: Attribute
        optional: true
        identifier: "builder_buildingblock"

nodes:
  - name: Fabric
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
    parent: ""
    children: NetworkPod

  # TODO: hide in menu
  - name: PodBuilder
    namespace: Network
    inherit_from:
      - NetworkBuilder

  - name: Pod
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
    parent: NetworkFabric
    children: ""
    attributes:
      - name: role
        kind: Dropdown
        choices:
          - name: fabric
            label: Fabric
          - name: cpu
            label: CPU
          - name: storage
            label: Storage
          - name: mor
            label: MOR
          - name: eor
            label: EOR
        optional: true
    relationships:
      - name: racks
        peer: LocationRack
        cardinality: many
        kind: Generic
        identifier: "rack__pod"
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "pod__device"
