# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: BuildingBlock
    namespace: Network
    hierarchical: true
    display_labels: ["name__value"]
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
      - name: index
        kind: Number

nodes:
  - name: Fabric
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
    parent: ""
    children: NetworkPod
    uniqueness_constraints:
      - ["name__value"]
    include_in_menu: false
    attributes:
      - name: amount_of_super_spines
        label: Amount of Super Spine switches
        kind: Number
        optional: false
        default_value: 4
      - name: fabric_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
          - name: create_reverse_sorted_device_interface_map
        default_value: create_sorted_device_interface_map
      - name: spine_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
          - name: create_reverse_sorted_device_interface_map
        default_value: create_sorted_device_interface_map
    relationships:
      - name: super_spine_switch_template
        peer: CoreObjectTemplate
        kind: Attribute
        cardinality: one
        identifier: "fabric__super_spine_template"

  - name: Pod
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
      - GeneratorTarget
    parent: NetworkFabric
    children: ""
    include_in_menu: false
    uniqueness_constraints:
      - ["parent", "name__value"]
      - ["name__value"]
    human_friendly_id:
      - "parent__name__value"
      - "name__value"
    attributes:
      - name: name
        kind: Text
        optional: false
        read_only: true
        computed_attribute:
          kind: Jinja2
          jinja2_template: "Pod-{{ fabric_identifier__value }}{{ index__value }}"
      - name: fabric_identifier
        kind: Text
        optional: false
        parameters:
          regex: "[A-Z]{1}"
      - name: amount_of_spines
        label: Amount of Spine switches
        kind: Number
        optional: false
        default_value: 4
      - name: role
        kind: Dropdown
        default_value: cpu
        choices:
          - name: fabric
            label: Fabric
          - name: cpu
            label: CPU
          - name: storage
            label: Storage
        optional: false
      - name: leaf_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
          - name: create_reverse_sorted_device_interface_map
        default_value: create_sorted_device_interface_map
      - name: spine_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
          - name: create_reverse_sorted_device_interface_map
        default_value: create_sorted_device_interface_map
    relationships:
      - name: spine_switch_template
        peer: CoreObjectTemplate
        kind: Attribute
        cardinality: one
        identifier: "pod__spine_template"
      - name: racks
        peer: LocationRack
        cardinality: many
        kind: Generic
        identifier: "rack__pod"
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "pod__device"
      - name: loopback_pool
        peer: CoreIPAddressPool
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "pod__loopback_pool"
      - name: prefix_pool
        peer: CoreIPPrefixPool
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "pod__prefix_pool"
