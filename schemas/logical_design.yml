# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: BuildingBlock
    namespace: Network
    hierarchical: true
    display_labels: ["name__value"]
    attributes:
      - name: name
        kind: Text
        unique: true
      - name: index
        kind: Number

nodes:
  - name: Fabric
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
    parent: ""
    children: NetworkPod

  # TODO: hide in menu
  - name: PodBuilder
    namespace: Network
    inherit_from:
      - GeneratorTracker

  - name: Pod
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
      - GeneratorTarget
    parent: NetworkFabric
    children: ""
    attributes:
      - name: role
        kind: Dropdown
        choices:
          - name: fabric
            label: Fabric
          - name: cpu
            label: CPU
          - name: storage
            label: Storage
          - name: mor
            label: MOR
          - name: eor
            label: EOR
        optional: true
    relationships:
      - name: racks
        peer: LocationRack
        cardinality: many
        kind: Generic
        identifier: "rack__pod"
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "pod__device"
