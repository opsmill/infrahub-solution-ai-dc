# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: BuildingBlock
    namespace: Network
    hierarchical: true
    display_labels: ["name__value"]
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 100
      - name: index
        kind: Number
        order_weight: 50000

nodes:
  - name: Fabric
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
    parent: ""
    children: NetworkPod
    include_in_menu: false
    attributes:
      - name: amount_of_super_spines
        label: Amount of Super Spine switches
        kind: Number
        optional: false
        default_value: 4
        order_weight: 1000
      - name: fabric_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
            color: "#869FB3"
          - name: create_reverse_sorted_device_interface_map
            color: "#004E64"
        default_value: create_sorted_device_interface_map
        order_weight: 2000
      - name: spine_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
            color: "#869FB3"
          - name: create_reverse_sorted_device_interface_map
            color: "#004E64"
        default_value: create_sorted_device_interface_map
        order_weight: 3000
    relationships:
      - name: super_spine_switch_template
        peer: CoreObjectTemplate
        kind: Attribute
        cardinality: one
        identifier: "fabric__super_spine_template"
        order_weight: 4000

  - name: Pod
    namespace: Network
    inherit_from:
      - NetworkBuildingBlock
      - GeneratorTarget
    parent: NetworkFabric
    children: ""
    include_in_menu: false
    attributes:
      - name: amount_of_spines
        label: Amount of Spine switches
        kind: Number
        optional: false
        default_value: 4
        order_weight: 1000
      - name: role
        kind: Dropdown
        default_value: cpu
        choices:
          - name: fabric
            label: Fabric
          - name: cpu
            label: CPU
          - name: storage
            label: Storage
        optional: false
        order_weight: 2000
      - name: leaf_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
            color: "#869FB3"
          - name: create_reverse_sorted_device_interface_map
            color: "#004E64"
        default_value: create_sorted_device_interface_map
        order_weight: 3000
      - name: spine_interface_sorting_method
        kind: Dropdown
        choices:
          - name: create_sorted_device_interface_map
            color: "#869FB3"
          - name: create_reverse_sorted_device_interface_map
            color: "#004E64"
        default_value: create_sorted_device_interface_map
        order_weight: 4000
    relationships:
      - name: spine_switch_template
        peer: CoreObjectTemplate
        kind: Attribute
        cardinality: one
        identifier: "pod__spine_template"
        order_weight: 5000
      - name: racks
        peer: LocationRack
        cardinality: many
        kind: Generic
        identifier: "rack__pod"
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "pod__device"
      - name: loopback_pool
        peer: CoreIPAddressPool
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "pod__loopback_pool"
        order_weight: 6000
      - name: prefix_pool
        peer: CoreIPPrefixPool
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "pod__prefix_pool"
        order_weight: 7000
