# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: Physical
    namespace: Location
    hierarchical: true
    display_labels: ["name__value"]
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        optional: true
      - name: index
        kind: Number
nodes:
  - name: Hall
    namespace: Location
    inherit_from:
      - LocationPhysical
    human_friendly_id:
      - name__value
    children: LocationRack
    parent: ""
    include_in_menu: false

  - name: Rack
    namespace: Location
    inherit_from:
      - LocationPhysical
      - GeneratorTarget
    parent: LocationHall
    children: ""
    uniqueness_constraints: [["pod", "index__value"]]
    human_friendly_id:
      - "pod__name__value"
      - "index__value"
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        optional: true
        read_only: true
        computed_attribute:
          kind: Jinja2
          jinja2_template: "Rack-{{ pod__fabric_identifier__value }}{{ pod__index__value }}-{{ row__value or 'Unknown-' }}{{ position__value or 'Unknown' }}"
      - name: row
        kind: Dropdown
        optional: true
        choices:
          - name: A
            label: A
          - name: B
            label: B
      - name: position
        kind: Number
        optional: true
      - name: rack_type
        kind: Dropdown
        choices:
          - name: compute
            label: Compute
          - name: storage
            label: Storage
        default_value: compute
      - name: amount_of_leafs
        kind: Number
        label: Amount of leaf switches
        default_value: 1
        optional: false
        parameters:
          min_value: 1
          max_value: 2
    relationships:
      - name: leaf_switch_template
        kind: Attribute
        peer: CoreObjectTemplate
        cardinality: one
        identifier: "rack__leaf_template"
      - name: pod
        peer: NetworkPod
        kind: Attribute
        cardinality: one
        optional: false
        identifier: "rack__pod"
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "rack__device"
