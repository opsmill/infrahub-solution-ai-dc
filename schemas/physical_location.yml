# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: Physical
    namespace: Location
    hierarchical: true
    display_labels: ["name__value"]
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
      - name: index
        kind: Number
nodes:
  - name: Hall
    namespace: Location
    inherit_from:
      - LocationPhysical
    human_friendly_id:
      - name__value
    children: LocationRack
    parent: ""
    include_in_menu: false

  - name: Rack
    namespace: Location
    inherit_from:
      - LocationPhysical
      - GeneratorTarget
    parent: LocationHall
    children: ""
    human_friendly_id:
      - name__value
    uniqueness_constraints: [["pod", "index__value"]]
    include_in_menu: false
    attributes:
      - name: rack_type
        kind: Dropdown
        choices:
          - name: compute
            label: Compute
          - name: storage
            label: Storage
        default_value: compute
    relationships:
      - name: leaf_switch_template
        kind: Attribute
        peer: CoreObjectTemplate
        cardinality: one
        identifier: "rack__leaf_template"
      - name: pod
        peer: NetworkPod
        kind: Attribute
        cardinality: one
        optional: false
        identifier: "rack__pod"
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "rack__device"
