# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"
generics:
  - name: Physical
    namespace: Location
    hierarchical: true
    attributes:
      - name: name
        kind: Text
      - name: index
        kind: Number
nodes:
  - name: Hall
    namespace: Location
    inherit_from:
      - LocationPhysical
    children: LocationRack
    parent: ""
  - name: Rack
    namespace: Location
    inherit_from:
      - LocationPhysical
    parent: LocationHall
    children: ""
    relationships:
      - name: devices
        peer: NetworkDevice
        kind: Generic
        cardinality: many
        identifier: "rack__device"
