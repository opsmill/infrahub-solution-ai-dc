query StartupConfigQuery($name: String!){
  NetworkDevice(hostname__value: $name) {
    edges {
      node {
        __typename
        hostname {
          value
        }
        loopback_ip {
          node {
            __typename
            address {
              ip
            }
          }
        }
        interfaces {
          edges {
            node {
              ...intfFrag
            }
          }
        }
        artifacts {
          edges {
            node(name__value: "base_config") {
              __typename
              id
              storage_id {
                value
              }
            }
        }
      }
    }
  }
}
